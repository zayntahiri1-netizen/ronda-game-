name: 🎴 Ronda - Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    name: Build APK & AAB
    runs-on: ubuntu-latest

    steps:
      # ── 1. سحب الكود ────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. إعداد Java 17 ────────────────────────────────
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ── 3. إعداد Node.js 24 ─────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      # ── 4. تثبيت المكتبات ────────────────────────────────
      - name: Install dependencies
        run: npm install --ignore-scripts --legacy-peer-deps

      # ── 5. تثبيت Capacitor CLI ──────────────────────────
      - name: Install Capacitor CLI
        run: npm install -g @capacitor/cli

      # ── 6. إضافة Android ────────────────────────────────
      - name: Add Android platform
        run: npx cap add android

      # ── 7. مزامنة Capacitor ──────────────────────────────
      - name: Capacitor sync
        run: npx cap sync android

      # ── 8. ضبط versionCode و versionName و targetSdkVersion تلقائياً ───────
      # versionCode = 100 + رقم الـ run (يتزايد مع كل build تلقائياً)
      # versionName = 1.0.XX — يظهر للمستخدم في المتجر
      # targetSdkVersion / compileSdkVersion = 35 (متطلب Google Play إلزامي منذ 2025)
      - name: Set versionCode & versionName & SDK 35
        run: |
          VERSION_CODE=$((100 + ${{ github.run_number }}))
          VERSION_NAME="1.0.${{ github.run_number }}"
          echo "📦 versionCode = $VERSION_CODE"
          echo "📦 versionName = $VERSION_NAME"

          BUILD_GRADLE="android/app/build.gradle"
          VARS_GRADLE="android/variables.gradle"

          # ── Version ────────────────────────────────────────────────────
          sed -i "s/versionCode .*/versionCode $VERSION_CODE/" "$BUILD_GRADLE"
          sed -i "s/versionName \".*\"/versionName \"$VERSION_NAME\"/" "$BUILD_GRADLE"

          # ── SDK 35 (Google Play يرفض targetSdkVersion < 35) ───────────
          # Capacitor 6 يحفظ القيم في variables.gradle
          if [ -f "$VARS_GRADLE" ]; then
            sed -i "s/compileSdkVersion = [0-9]*/compileSdkVersion = 35/" "$VARS_GRADLE"
            sed -i "s/targetSdkVersion = [0-9]*/targetSdkVersion = 35/" "$VARS_GRADLE"
            echo "✓ variables.gradle → compileSdk/targetSdk = 35"
            grep -E "compileSdkVersion|targetSdkVersion" "$VARS_GRADLE"
          fi
          # fallback مباشر على build.gradle
          sed -i "s/compileSdkVersion [0-9]*/compileSdkVersion 35/" "$BUILD_GRADLE" 2>/dev/null || true
          sed -i "s/targetSdkVersion [0-9]*/targetSdkVersion 35/" "$BUILD_GRADLE" 2>/dev/null || true

          echo "✓ build.gradle updated:"
          grep -E "versionCode|versionName|compileSdk|targetSdk" "$BUILD_GRADLE"

      # ── 9. تطبيق الـ patches ─────────────────────────────
      - name: Apply Android patches (safe)
        run: |
          mkdir -p android/app/src/main/res/values
          cp android-patches/strings.xml android/app/src/main/res/values/strings.xml
          echo "✓ strings.xml"

          mkdir -p android/app/src/main/res/xml
          cp android-patches/network_security_config.xml android/app/src/main/res/xml/network_security_config.xml
          echo "✓ network_security_config.xml"

          cp android-patches/backup_rules.xml android/app/src/main/res/xml/backup_rules.xml
          echo "✓ backup_rules.xml"

          cp android-patches/AndroidManifest.xml android/app/src/main/AndroidManifest.xml
          echo "✓ AndroidManifest.xml replaced from android-patches"

          echo "=== Manifest final check ==="
          grep -E "APPLICATION_ID|AD_ID|VIBRATE|networkSecurity|rondatahiro|scheme" android/app/src/main/AndroidManifest.xml || true

      # ── 10. نسخ أيقونات Ronda Tahiro ─────────────────────
      - name: Apply Ronda Tahiro icons
        run: |
          RES="android/app/src/main/res"
          PATCHES="android-patches/res"
          for dir in mipmap-mdpi mipmap-hdpi mipmap-xhdpi mipmap-xxhdpi mipmap-xxxhdpi; do
            mkdir -p "$RES/$dir"
            cp "$PATCHES/$dir/"*.png "$RES/$dir/"
            echo "✓ icons copied → $dir"
          done

      # ── 11. إعداد Keystore ───────────────────────────────
      - name: Setup keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > release-keystore.jks
            echo "✓ Keystore from secrets"
          else
            keytool -genkeypair -v \
              -keystore release-keystore.jks \
              -alias ronda-key \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass ronda2024 -keypass ronda2024 \
              -dname "CN=Ronda, O=RondaGames, L=Casablanca, C=MA" \
              -noprompt
            echo "⚠ Temporary keystore created"
          fi

      # ── 12. صلاحيات gradlew ──────────────────────────────
      - name: Make gradlew executable
        run: chmod +x android/gradlew

      # ── 13. بناء Debug APK ───────────────────────────────
      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon
        continue-on-error: true

      # ── 14. بناء Release APK ─────────────────────────────
      - name: Build Release APK
        env:
          KEYSTORE_PASS: ${{ secrets.KEYSTORE_PASS }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          KS_PASS="${KEYSTORE_PASS:-ronda2024}"
          KS_ALIAS="${KEY_ALIAS:-ronda-key}"
          cd android
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file="$(pwd)/../release-keystore.jks" \
            -Pandroid.injected.signing.store.password="$KS_PASS" \
            -Pandroid.injected.signing.key.alias="$KS_ALIAS" \
            -Pandroid.injected.signing.key.password="$KS_PASS" \
            --no-daemon
        continue-on-error: true

      # ── 15. بناء AAB للـ Play Store ──────────────────────
      - name: Build Release AAB
        env:
          KEYSTORE_PASS: ${{ secrets.KEYSTORE_PASS }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          KS_PASS="${KEYSTORE_PASS:-ronda2024}"
          KS_ALIAS="${KEY_ALIAS:-ronda-key}"
          cd android
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file="$(pwd)/../release-keystore.jks" \
            -Pandroid.injected.signing.store.password="$KS_PASS" \
            -Pandroid.injected.signing.key.alias="$KS_ALIAS" \
            -Pandroid.injected.signing.key.password="$KS_PASS" \
            --no-daemon

      # ── 16. رفع الملفات ──────────────────────────────────
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: ronda-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: warn

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: ronda-release-apk
          path: android/app/build/outputs/apk/release/app-release*.apk
          if-no-files-found: warn

      - name: Upload AAB (Play Store)
        uses: actions/upload-artifact@v4
        with:
          name: ronda-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: warn

      # ── 17. ملخص ────────────────────────────────────────
      - name: Build Summary
        if: always()
        run: |
          VERSION_CODE=$((100 + ${{ github.run_number }}))
          VERSION_NAME="1.0.${{ github.run_number }}"
          echo "## 🎴 Ronda Build Results" >> $GITHUB_STEP_SUMMARY
          echo "**versionCode:** $VERSION_CODE | **versionName:** $VERSION_NAME" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          for f in \
            "android/app/build/outputs/apk/debug/app-debug.apk|Debug APK للتصحيح" \
            "android/app/build/outputs/apk/release/app-release.apk|Release APK للإصدار" \
            "android/app/build/outputs/bundle/release/app-release.aab|AAB متجر جوجل بلاي"; do
            FILE="${f%%|*}"; LABEL="${f##*|}"
            if [ -f "$FILE" ]; then
              echo "✅ **$LABEL:** $(du -sh $FILE | cut -f1)" >> $GITHUB_STEP_SUMMARY
            else
              echo "❌ **$LABEL:** لم يُنشأ" >> $GITHUB_STEP_SUMMARY
            fi
          done
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📥 حمّل من **Artifacts** أعلى الصفحة" >> $GITHUB_STEP_SUMMARY
