name: 🎴 Ronda - Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    name: Build APK & AAB
    runs-on: ubuntu-latest

    steps:
      # ── 1. سحب الكود ────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. إعداد Java 17 ────────────────────────────────
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ── 3. إعداد Node.js 24 ─────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      # ── 4. تثبيت المكتبات ────────────────────────────────
      - name: Install dependencies
        run: npm install --ignore-scripts --legacy-peer-deps

      # ── 5. تثبيت Capacitor CLI ──────────────────────────
      - name: Install Capacitor CLI
        run: npm install -g @capacitor/cli@^7.0.0

      # ── 6. إضافة Android ────────────────────────────────
      - name: Add Android platform
        run: |
          rm -rf android
          npx cap add android

      # ── 7. مزامنة Capacitor ──────────────────────────────
      - name: Capacitor sync
        run: npx cap sync android

      # ── 7b. تشخيص: عرض بنية build.gradle و variables.gradle ─
      - name: Inspect Gradle files
        run: |
          echo "=== android/variables.gradle ==="
          cat android/variables.gradle 2>/dev/null || echo "NOT FOUND"
          echo ""
          echo "=== android/app/build.gradle (first 30 lines) ==="
          head -30 android/app/build.gradle 2>/dev/null || echo "NOT FOUND"
          echo ""
          echo "=== android/build.gradle (first 20 lines) ==="
          head -20 android/build.gradle 2>/dev/null || echo "NOT FOUND"

      # ── 8. رفع targetSdkVersion إلى 35 (مطلوب من Google Play) ──
      - name: Set targetSdkVersion=35 & compileSdkVersion=35
        run: |
          # Capacitor 7 يستخدم variables.gradle للتحكم في SDK versions
          VARS="android/variables.gradle"
          if [ -f "$VARS" ]; then
            sed -i "s/minSdkVersion = .*/minSdkVersion = 22/" "$VARS"
            sed -i "s/compileSdkVersion = .*/compileSdkVersion = 35/" "$VARS"
            sed -i "s/targetSdkVersion = .*/targetSdkVersion = 35/" "$VARS"
            echo "✓ variables.gradle updated:"
            cat "$VARS"
          else
            echo "⚠ variables.gradle not found, trying build.gradle directly"
            BUILD_GRADLE="android/app/build.gradle"
            # طباعة السطور الأولى للتشخيص
            head -20 "$BUILD_GRADLE"
            # تعديل آمن — فقط داخل android {} block
            sed -i '/compileSdkVersion\s*[0-9]/s/[0-9]\+/35/' "$BUILD_GRADLE"
            sed -i '/targetSdkVersion\s*[0-9]/s/[0-9]\+/35/' "$BUILD_GRADLE"
            sed -i '/compileSdk\s*[0-9]/s/[0-9]\+/35/' "$BUILD_GRADLE"
            sed -i '/targetSdk\s*[0-9]/s/[0-9]\+/35/' "$BUILD_GRADLE"
          fi

      # ── 9. ضبط versionCode و versionName تلقائياً ───────
      - name: Set versionCode & versionName
        run: |
          VERSION_CODE=$((100 + ${{ github.run_number }}))
          VERSION_NAME="1.0.${{ github.run_number }}"
          echo "📦 versionCode = $VERSION_CODE"
          echo "📦 versionName = $VERSION_NAME"

          BUILD_GRADLE="android/app/build.gradle"

          sed -i "s/versionCode .*/versionCode $VERSION_CODE/" "$BUILD_GRADLE"
          sed -i "s/versionName \".*\"/versionName \"$VERSION_NAME\"/" "$BUILD_GRADLE"

          echo "✓ build.gradle updated:"
          grep -E "versionCode|versionName" "$BUILD_GRADLE"

      # ── 10. تطبيق الـ patches ─────────────────────────────
      - name: Apply Android patches (safe)
        run: |
          mkdir -p android/app/src/main/res/values
          cp android-patches/strings.xml android/app/src/main/res/values/strings.xml
          echo "✓ strings.xml"

          mkdir -p android/app/src/main/res/xml
          cp android-patches/network_security_config.xml android/app/src/main/res/xml/network_security_config.xml
          echo "✓ network_security_config.xml"

          cp android-patches/AndroidManifest.xml android/app/src/main/AndroidManifest.xml
          echo "✓ AndroidManifest.xml replaced from android-patches"

          echo "=== Manifest final check ==="
          grep -E "APPLICATION_ID|AD_ID|VIBRATE|networkSecurity|rondatahiro|scheme" android/app/src/main/AndroidManifest.xml || true

      # ── 11. نسخ أيقونات Ronda Tahiro ─────────────────────
      - name: Apply Ronda Tahiro icons
        run: |
          RES="android/app/src/main/res"
          PATCHES="android-patches/res"
          for dir in mipmap-mdpi mipmap-hdpi mipmap-xhdpi mipmap-xxhdpi mipmap-xxxhdpi; do
            mkdir -p "$RES/$dir"
            cp "$PATCHES/$dir/"*.png "$RES/$dir/" 2>/dev/null || true
            echo "✓ icons copied → $dir"
          done

      # ── 12. إعداد Keystore ───────────────────────────────
      - name: Setup keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > release-keystore.jks
            echo "✓ Keystore from secrets"
          else
            keytool -genkeypair -v \
              -keystore release-keystore.jks \
              -alias ronda-key \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass ronda2024 -keypass ronda2024 \
              -dname "CN=Ronda, O=RondaGames, L=Casablanca, C=MA" \
              -noprompt
            echo "⚠ Temporary keystore created"
          fi

      # ── 13. صلاحيات gradlew ──────────────────────────────
      - name: Make gradlew executable
        run: chmod +x android/gradlew

      # ── 14. بناء Debug APK ───────────────────────────────
      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon
        continue-on-error: true

      # ── 15. بناء Release APK ─────────────────────────────
      - name: Build Release APK
        env:
          KEYSTORE_PASS: ${{ secrets.KEYSTORE_PASS }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          KS_PASS="${KEYSTORE_PASS:-ronda2024}"
          KS_ALIAS="${KEY_ALIAS:-ronda-key}"
          cd android
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file="$(pwd)/../release-keystore.jks" \
            -Pandroid.injected.signing.store.password="$KS_PASS" \
            -Pandroid.injected.signing.key.alias="$KS_ALIAS" \
            -Pandroid.injected.signing.key.password="$KS_PASS" \
            --no-daemon
        continue-on-error: true

      # ── 16. بناء AAB للـ Play Store ──────────────────────
      - name: Build Release AAB
        env:
          KEYSTORE_PASS: ${{ secrets.KEYSTORE_PASS }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          KS_PASS="${KEYSTORE_PASS:-ronda2024}"
          KS_ALIAS="${KEY_ALIAS:-ronda-key}"
          cd android
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file="$(pwd)/../release-keystore.jks" \
            -Pandroid.injected.signing.store.password="$KS_PASS" \
            -Pandroid.injected.signing.key.alias="$KS_ALIAS" \
            -Pandroid.injected.signing.key.password="$KS_PASS" \
            --no-daemon --stacktrace 2>&1 | tail -60
        continue-on-error: true

      # ── 17. رفع الملفات ──────────────────────────────────
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: ronda-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: warn

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: ronda-release-apk
          path: android/app/build/outputs/apk/release/app-release*.apk
          if-no-files-found: warn

      - name: Upload AAB (Play Store)
        uses: actions/upload-artifact@v4
        with:
          name: ronda-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: warn

      # ── 18. ملخص ────────────────────────────────────────
      - name: Build Summary
        if: always()
        run: |
          VERSION_CODE=$((100 + ${{ github.run_number }}))
          VERSION_NAME="1.0.${{ github.run_number }}"
          echo "## 🎴 Ronda Build Results" >> $GITHUB_STEP_SUMMARY
          echo "**versionCode:** $VERSION_CODE | **versionName:** $VERSION_NAME" >> $GITHUB_STEP_SUMMARY
          echo "**targetSdkVersion:** 35 ✅" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          for f in \
            "android/app/build/outputs/apk/debug/app-debug.apk|Debug APK للتصحيح" \
            "android/app/build/outputs/apk/release/app-release.apk|Release APK للإصدار" \
            "android/app/build/outputs/bundle/release/app-release.aab|AAB متجر جوجل بلاي"; do
            FILE="${f%%|*}"; LABEL="${f##*|}"
            if [ -f "$FILE" ]; then
              echo "✅ **$LABEL:** $(du -sh $FILE | cut -f1)" >> $GITHUB_STEP_SUMMARY
            else
              echo "❌ **$LABEL:** لم يُنشأ" >> $GITHUB_STEP_SUMMARY
            fi
          done
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📥 حمّل من **Artifacts** أعلى الصفحة" >> $GITHUB_STEP_SUMMARY
