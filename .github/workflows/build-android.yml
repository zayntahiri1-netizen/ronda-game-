name: 🎴 Ronda - Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    name: Build APK & AAB
    runs-on: ubuntu-latest

    steps:
      # ── 1. سحب الكود ────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. إعداد Java 17 ────────────────────────────────
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ── 3. إعداد Node.js 20 ─────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── 4. تثبيت المكتبات ────────────────────────────────
      - name: Install dependencies
        run: npm install --legacy-peer-deps

      # ── 5. إضافة Android ومزامنة ─────────────────────────
      - name: Add & Sync Android
        run: |
          rm -rf android
          npx cap add android
          npx cap sync android

      # ── 6. فحص بنية Gradle (تشخيص) ──────────────────────
      - name: Inspect Gradle structure
        run: |
          echo "=== files in android/ ===" && ls android/
          echo "=== variables.gradle ===" && cat android/variables.gradle 2>/dev/null || echo "NOT FOUND"
          echo "=== build.gradle (first 40) ===" && head -40 android/app/build.gradle 2>/dev/null || echo "NOT FOUND"
          echo "=== build.gradle.kts (first 40) ===" && head -40 android/app/build.gradle.kts 2>/dev/null || echo "NOT FOUND"
          echo "=== settings.gradle ===" && head -10 android/settings.gradle 2>/dev/null || echo "NOT FOUND"

      # ── 7. ضبط SDK 35 + versionCode + versionName ───────
      - name: Configure build versions
        run: |
          VC=$((100 + ${{ github.run_number }}))
          VN="1.0.${{ github.run_number }}"
          echo "versionCode=$VC versionName=$VN"

          # variables.gradle
          if [ -f "android/variables.gradle" ]; then
            sed -i "s/compileSdkVersion = [0-9]*/compileSdkVersion = 35/" android/variables.gradle
            sed -i "s/targetSdkVersion = [0-9]*/targetSdkVersion = 35/"   android/variables.gradle
            echo "✓ variables.gradle:"; cat android/variables.gradle
          fi

          # build.gradle Groovy
          if [ -f "android/app/build.gradle" ]; then
            F="android/app/build.gradle"
            sed -i "s/compileSdkVersion [0-9]*/compileSdkVersion 35/" "$F"
            sed -i "s/compileSdk [0-9]*/compileSdk 35/"               "$F"
            sed -i "s/targetSdkVersion [0-9]*/targetSdkVersion 35/"   "$F"
            sed -i "s/targetSdk [0-9]*/targetSdk 35/"                 "$F"
            sed -i "s/versionCode [0-9]*/versionCode $VC/"            "$F"
            sed -i "s/versionName \"[^\"]*\"/versionName \"$VN\"/"    "$F"
            echo "✓ build.gradle patched"
            grep -E "compileSdk|targetSdk|versionCode|versionName" "$F"
          fi

          # build.gradle.kts Kotlin DSL
          if [ -f "android/app/build.gradle.kts" ]; then
            F="android/app/build.gradle.kts"
            sed -i "s/compileSdk = [0-9]*/compileSdk = 35/"           "$F"
            sed -i "s/targetSdk = [0-9]*/targetSdk = 35/"             "$F"
            sed -i "s/versionCode = [0-9]*/versionCode = $VC/"        "$F"
            sed -i "s/versionName = \"[^\"]*\"/versionName = \"$VN\"/" "$F"
            echo "✓ build.gradle.kts patched"
            grep -E "compileSdk|targetSdk|versionCode|versionName" "$F"
          fi

      # ── 8. تطبيق الـ patches ─────────────────────────────
      - name: Apply Android patches
        run: |
          mkdir -p android/app/src/main/res/values
          cp android-patches/strings.xml android/app/src/main/res/values/strings.xml
          echo "✓ strings.xml"
          mkdir -p android/app/src/main/res/xml
          cp android-patches/network_security_config.xml android/app/src/main/res/xml/network_security_config.xml
          echo "✓ network_security_config.xml"
          cp android-patches/AndroidManifest.xml android/app/src/main/AndroidManifest.xml
          echo "✓ AndroidManifest.xml"

      # ── 9. نسخ الأيقونات ──────────────────────────────────
      - name: Apply icons
        run: |
          RES="android/app/src/main/res"
          for dir in mipmap-mdpi mipmap-hdpi mipmap-xhdpi mipmap-xxhdpi mipmap-xxxhdpi; do
            mkdir -p "$RES/$dir"
            cp "android-patches/res/$dir/"*.png "$RES/$dir/" 2>/dev/null || true
          done
          echo "✓ icons copied"

      # ── 10. إعداد Keystore ───────────────────────────────
      - name: Setup keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > release-keystore.jks
            echo "✓ Keystore from secrets"
          else
            keytool -genkeypair -v \
              -keystore release-keystore.jks \
              -alias ronda-key \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass ronda2024 -keypass ronda2024 \
              -dname "CN=Ronda, O=RondaGames, L=Casablanca, C=MA" \
              -noprompt
            echo "⚠ Temporary keystore created"
          fi

      # ── 11. صلاحيات gradlew ──────────────────────────────
      - name: Make gradlew executable
        run: chmod +x android/gradlew

      # ── 12. بناء Debug APK ───────────────────────────────
      - name: Build Debug APK
        run: cd android && ./gradlew assembleDebug --no-daemon
        continue-on-error: true

      # ── 13. بناء Release APK ─────────────────────────────
      - name: Build Release APK
        env:
          KEYSTORE_PASS: ${{ secrets.KEYSTORE_PASS }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          KS_PASS="${KEYSTORE_PASS:-ronda2024}"
          KS_ALIAS="${KEY_ALIAS:-ronda-key}"
          cd android && ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file="$(pwd)/../release-keystore.jks" \
            -Pandroid.injected.signing.store.password="$KS_PASS" \
            -Pandroid.injected.signing.key.alias="$KS_ALIAS" \
            -Pandroid.injected.signing.key.password="$KS_PASS" \
            --no-daemon
        continue-on-error: true

      # ── 14. بناء AAB للـ Play Store ──────────────────────
      - name: Build Release AAB
        env:
          KEYSTORE_PASS: ${{ secrets.KEYSTORE_PASS }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          KS_PASS="${KEYSTORE_PASS:-ronda2024}"
          KS_ALIAS="${KEY_ALIAS:-ronda-key}"
          cd android && ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file="$(pwd)/../release-keystore.jks" \
            -Pandroid.injected.signing.store.password="$KS_PASS" \
            -Pandroid.injected.signing.key.alias="$KS_ALIAS" \
            -Pandroid.injected.signing.key.password="$KS_PASS" \
            --no-daemon
        continue-on-error: true

      # ── 15. رفع الملفات ──────────────────────────────────
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: ronda-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: warn

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: ronda-release-apk
          path: android/app/build/outputs/apk/release/app-release*.apk
          if-no-files-found: warn

      - name: Upload AAB (Play Store)
        uses: actions/upload-artifact@v4
        with:
          name: ronda-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: warn

      # ── 16. ملخص ─────────────────────────────────────────
      - name: Build Summary
        if: always()
        run: |
          VC=$((100 + ${{ github.run_number }}))
          VN="1.0.${{ github.run_number }}"
          echo "## 🎴 Ronda Build Results" >> $GITHUB_STEP_SUMMARY
          echo "**versionCode:** $VC | **versionName:** $VN | **targetSdk:** 35 ✅" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          for f in \
            "android/app/build/outputs/apk/debug/app-debug.apk|Debug APK" \
            "android/app/build/outputs/apk/release/app-release.apk|Release APK" \
            "android/app/build/outputs/bundle/release/app-release.aab|AAB (Play Store)"; do
            FILE="${f%%|*}"; LABEL="${f##*|}"
            if [ -f "$FILE" ]; then
              echo "✅ **$LABEL:** $(du -sh $FILE | cut -f1)" >> $GITHUB_STEP_SUMMARY
            else
              echo "❌ **$LABEL:** لم يُنشأ" >> $GITHUB_STEP_SUMMARY
            fi
          done
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📥 حمّل من **Artifacts** أعلى الصفحة" >> $GITHUB_STEP_SUMMARY
