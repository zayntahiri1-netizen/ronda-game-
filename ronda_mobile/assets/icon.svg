<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Background gradient: deep midnight blue to near-black -->
    <radialGradient id="bgGrad" cx="50%" cy="40%" r="60%">
      <stop offset="0%"   stop-color="#0f1a2e"/>
      <stop offset="100%" stop-color="#030508"/>
    </radialGradient>

    <!-- Gold gradient for main elements -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#f5d060"/>
      <stop offset="40%"  stop-color="#c9a227"/>
      <stop offset="70%"  stop-color="#e8c050"/>
      <stop offset="100%" stop-color="#9b7a1a"/>
    </linearGradient>

    <!-- Card face gradient -->
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#fdf6e3"/>
      <stop offset="100%" stop-color="#f0e0b0"/>
    </linearGradient>

    <!-- Red gradient for suit -->
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#e84040"/>
      <stop offset="100%" stop-color="#b01010"/>
    </linearGradient>

    <!-- Glow filter -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Inner glow for gold -->
    <filter id="goldGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Drop shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000" flood-opacity="0.8"/>
    </filter>

    <!-- Clip for rounded square -->
    <clipPath id="roundedClip">
      <rect width="1024" height="1024" rx="200" ry="200"/>
    </clipPath>
  </defs>

  <!-- Rounded square background -->
  <rect width="1024" height="1024" rx="200" ry="200" fill="url(#bgGrad)"/>

  <!-- ═══════════════════════════════════════
       MOROCCAN ZELLIGE BORDER PATTERN
       ═══════════════════════════════════════ -->
  <g clip-path="url(#roundedClip)" opacity="0.35">
    <!-- Top border band -->
    <rect x="0" y="0" width="1024" height="72" fill="none" stroke="url(#goldGrad)" stroke-width="1.5"/>
    <!-- Bottom border band -->
    <rect x="0" y="952" width="1024" height="72" fill="none" stroke="url(#goldGrad)" stroke-width="1.5"/>

    <!-- Geometric corner star - Top Left -->
    <g transform="translate(72, 72)" fill="url(#goldGrad)" opacity="0.7">
      <polygon points="0,-36 8,-8 36,0 8,8 0,36 -8,8 -36,0 -8,-8" />
      <polygon points="0,-22 5,-5 22,0 5,5 0,22 -5,5 -22,0 -5,-5" opacity="0.5"/>
    </g>
    <!-- Top Right -->
    <g transform="translate(952, 72)" fill="url(#goldGrad)" opacity="0.7">
      <polygon points="0,-36 8,-8 36,0 8,8 0,36 -8,8 -36,0 -8,-8" />
    </g>
    <!-- Bottom Left -->
    <g transform="translate(72, 952)" fill="url(#goldGrad)" opacity="0.7">
      <polygon points="0,-36 8,-8 36,0 8,8 0,36 -8,8 -36,0 -8,-8" />
    </g>
    <!-- Bottom Right -->
    <g transform="translate(952, 952)" fill="url(#goldGrad)" opacity="0.7">
      <polygon points="0,-36 8,-8 36,0 8,8 0,36 -8,8 -36,0 -8,-8" />
    </g>

    <!-- Repeating star pattern - top border -->
    <g fill="url(#goldGrad)" opacity="0.5">
      <g transform="translate(200, 36)"><polygon points="0,-18 4,-4 18,0 4,4 0,18 -4,4 -18,0 -4,-4"/></g>
      <g transform="translate(350, 36)"><polygon points="0,-18 4,-4 18,0 4,4 0,18 -4,4 -18,0 -4,-4"/></g>
      <g transform="translate(512, 36)"><polygon points="0,-18 4,-4 18,0 4,4 0,18 -4,4 -18,0 -4,-4"/></g>
      <g transform="translate(674, 36)"><polygon points="0,-18 4,-4 18,0 4,4 0,18 -4,4 -18,0 -4,-4"/></g>
      <g transform="translate(824, 36)"><polygon points="0,-18 4,-4 18,0 4,4 0,18 -4,4 -18,0 -4,-4"/></g>
    </g>

    <!-- Vertical arabesque lines -->
    <line x1="36" y1="108" x2="36" y2="916" stroke="url(#goldGrad)" stroke-width="2" opacity="0.4"/>
    <line x1="988" y1="108" x2="988" y2="916" stroke="url(#goldGrad)" stroke-width="2" opacity="0.4"/>
  </g>

  <!-- ═══════════════════════════════════════
       LARGE BACKGROUND STAR / MANDALA
       ═══════════════════════════════════════ -->
  <g transform="translate(512, 512)" opacity="0.12" filter="url(#glow)">
    <!-- 16-point geometric star -->
    <polygon points="0,-380 25,-25 380,0 25,25 0,380 -25,25 -380,0 -25,-25"
             fill="none" stroke="url(#goldGrad)" stroke-width="2"/>
    <polygon points="0,-340 18,-18 340,0 18,18 0,340 -18,18 -340,0 -18,-18"
             fill="none" stroke="url(#goldGrad)" stroke-width="1.5"/>
    <!-- Rotating inner polygon -->
    <polygon points="0,-280 280,0 0,280 -280,0"
             fill="none" stroke="url(#goldGrad)" stroke-width="2"/>
    <polygon points="0,-280 280,0 0,280 -280,0"
             fill="none" stroke="url(#goldGrad)" stroke-width="1.5"
             transform="rotate(45)"/>
    <!-- Circles -->
    <circle r="200" fill="none" stroke="url(#goldGrad)" stroke-width="1.5"/>
    <circle r="280" fill="none" stroke="url(#goldGrad)" stroke-width="1"/>
    <circle r="340" fill="none" stroke="url(#goldGrad)" stroke-width="0.8"/>
  </g>

  <!-- ═══════════════════════════════════════
       PLAYING CARDS - FANNED BEHIND
       ═══════════════════════════════════════ -->
  <!-- Card 3 - far left, tilted -20° -->
  <g transform="translate(512, 560) rotate(-20)" filter="url(#shadow)">
    <rect x="-110" y="-160" width="220" height="320" rx="20" ry="20"
          fill="url(#cardGrad)" stroke="#c9a227" stroke-width="3"/>
    <!-- Card back decorative lines -->
    <rect x="-95" y="-145" width="190" height="290" rx="12" ry="12"
          fill="none" stroke="#c9a227" stroke-width="1.5" opacity="0.4"/>
    <!-- Suit: hearts top-left -->
    <text x="-90" y="-110" font-size="52" fill="url(#redGrad)" font-family="Georgia, serif">♥</text>
    <text x="-90" y="-60"  font-size="36" fill="#222" font-family="Georgia, serif" font-weight="bold">7</text>
  </g>

  <!-- Card 2 - slight right tilt +12° -->
  <g transform="translate(512, 540) rotate(12)" filter="url(#shadow)">
    <rect x="-110" y="-160" width="220" height="320" rx="20" ry="20"
          fill="url(#cardGrad)" stroke="#c9a227" stroke-width="3"/>
    <rect x="-95" y="-145" width="190" height="290" rx="12" ry="12"
          fill="none" stroke="#c9a227" stroke-width="1.5" opacity="0.4"/>
    <text x="-90" y="-110" font-size="52" fill="#1a1a8c" font-family="Georgia, serif">♠</text>
    <text x="-90" y="-60"  font-size="36" fill="#222" font-family="Georgia, serif" font-weight="bold">A</text>
    <!-- Big center suit -->
    <text x="0" y="30" font-size="90" fill="#1a1a8c" font-family="Georgia, serif"
          text-anchor="middle">♠</text>
  </g>

  <!-- Card 1 - CENTER, straight -->
  <g transform="translate(512, 520)" filter="url(#shadow)">
    <rect x="-120" y="-170" width="240" height="340" rx="22" ry="22"
          fill="url(#cardGrad)" stroke="url(#goldGrad)" stroke-width="4"/>
    <!-- Inner border -->
    <rect x="-104" y="-154" width="208" height="308" rx="14" ry="14"
          fill="none" stroke="url(#goldGrad)" stroke-width="2" opacity="0.6"/>
    <!-- Top-left corner -->
    <text x="-100" y="-120" font-size="44" fill="url(#redGrad)" font-family="Georgia, serif">♦</text>
    <text x="-100" y="-76"  font-size="32" fill="#222" font-family="Georgia, serif" font-weight="bold">R</text>
    <!-- Center large suit -->
    <text x="0" y="50" font-size="110" fill="url(#redGrad)" font-family="Georgia, serif"
          text-anchor="middle" filter="url(#goldGlow)">♦</text>
    <!-- Bottom-right corner (inverted) -->
    <text x="100" y="150" font-size="44" fill="url(#redGrad)" font-family="Georgia, serif"
          text-anchor="end" transform="rotate(180, 0, 130)">♦</text>
  </g>

  <!-- ═══════════════════════════════════════
       ARABIC TITLE "روندة"
       ═══════════════════════════════════════ -->
  <!-- Outer glow for title -->
  <text x="512" y="245"
        font-size="148" font-weight="900"
        font-family="'Arial', sans-serif"
        text-anchor="middle"
        fill="#c9a227"
        opacity="0.2"
        filter="url(#glow)">روندة</text>

  <!-- Main title -->
  <text x="512" y="245"
        font-size="148" font-weight="900"
        font-family="'Arial', sans-serif"
        text-anchor="middle"
        fill="url(#goldGrad)"
        filter="url(#goldGlow)">روندة</text>

  <!-- Decorative line under title -->
  <g transform="translate(512, 265)">
    <line x1="-220" y1="0" x2="-60" y2="0" stroke="url(#goldGrad)" stroke-width="2.5" opacity="0.7"/>
    <polygon points="0,-8 8,0 0,8 -8,0" fill="url(#goldGrad)"/>
    <line x1="60" y1="0" x2="220" y2="0" stroke="url(#goldGrad)" stroke-width="2.5" opacity="0.7"/>
  </g>

  <!-- ═══════════════════════════════════════
       SUBTITLE
       ═══════════════════════════════════════ -->
  <text x="512" y="870"
        font-size="46"
        font-family="'Arial', sans-serif"
        text-anchor="middle"
        fill="url(#goldGrad)"
        opacity="0.85"
        letter-spacing="4">RONDA</text>

  <!-- Small decorative dots -->
  <circle cx="330" cy="858" r="5" fill="url(#goldGrad)" opacity="0.6"/>
  <circle cx="694" cy="858" r="5" fill="url(#goldGrad)" opacity="0.6"/>
  <circle cx="360" cy="858" r="3" fill="url(#goldGrad)" opacity="0.4"/>
  <circle cx="664" cy="858" r="3" fill="url(#goldGrad)" opacity="0.4"/>

  <!-- ═══════════════════════════════════════
       SUBTLE VIGNETTE OVERLAY
       ═══════════════════════════════════════ -->
  <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
    <stop offset="50%" stop-color="transparent"/>
    <stop offset="100%" stop-color="#000" stop-opacity="0.6"/>
  </radialGradient>
  <rect width="1024" height="1024" rx="200" ry="200" fill="url(#vignette)"/>
</svg>
